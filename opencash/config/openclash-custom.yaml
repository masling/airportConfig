    interval: 600
    tolerance: 100

  - name: 🇺🇸 美国
    type: select
    proxies: [🇺🇸 美国-自动]
    use: [Airport]
    filter: "(?i)(🇺🇸|美国|美國|USA|United States|America|\\bUS\\b|洛杉矶|洛杉|圣何塞|西雅图|纽约|达拉斯|Los Angeles|San Jose|Seattle|New York|Dallas)"

  - name: 🇺🇸 美国-自动
