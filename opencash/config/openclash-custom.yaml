# OpenClash / Mihomo main config for KWRT/OpenWrt.
# Nodes are loaded from the local provider below. Do not put subscription URLs
# or concrete airport nodes in this file.

mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
secret: ""
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "time.*.gov"
    - pool.ntp.org
    - "+.market.xiaomi.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - "https://1.1.1.1/dns-query#🚀 节点选择"
    - "https://8.8.8.8/dns-query#🚀 节点选择"
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  mtu: 9000
  gso: true
  gso-max-size: 65536

proxy-providers:
  Airport:
    type: file
    path: /etc/openclash/proxy_provider/airport.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 所有-自动
      - 🇭🇰 香港
      - 🇹🇼 台湾
      - 🇯🇵 日本
      - 🇸🇬 新加坡
      - 🇺🇸 美国
      - 🇰🇷 韩国
      - 🇬🇧 英国
      - 🇪🇺 欧洲
      - 🌍 其他
      - 🧭 所有节点
      - 🚑 所有-故障转移
      - DIRECT

  - name: 🤖 AI
    type: select
    proxies: [🇺🇸 美国, 🇯🇵 日本, 🇸🇬 新加坡, 🇹🇼 台湾, 🧭 所有节点]

  - name: 💬 ChatGPT
    type: select
    proxies: [🇺🇸 美国, 🇯🇵 日本, 🇸🇬 新加坡, 🇹🇼 台湾, 🧭 所有节点]

  - name: 🧠 Claude
    type: select
    proxies: [🇺🇸 美国, 🇯🇵 日本, 🇸🇬 新加坡, 🇹🇼 台湾, 🧭 所有节点]

  - name: ✨ Gemini
    type: select
    proxies: [🇺🇸 美国, 🇯🇵 日本, 🇸🇬 新加坡, 🇹🇼 台湾, 🧭 所有节点]

  - name: 🔎 Perplexity
    type: select
    proxies: [🇺🇸 美国, 🇯🇵 日本, 🇸🇬 新加坡, 🇹🇼 台湾, 🧭 所有节点]

  - name: 🧑‍💻 Copilot
    type: select
    proxies: [♻️ 所有-自动, 🇺🇸 美国, 🇯🇵 日本, 🇸🇬 新加坡, 🇭🇰 香港, 🧭 所有节点]

  - name: 📺 YouTube
    type: select
    proxies: [♻️ 所有-自动, 🇭🇰 香港, 🇹🇼 台湾, 🇯🇵 日本, 🇸🇬 新加坡, 🇺🇸 美国, 🌍 其他, 🧭 所有节点]

  - name: 🔍 Google
    type: select
    proxies: [🇭🇰 香港, 🇯🇵 日本, 🇸🇬 新加坡, 🇺🇸 美国, ♻️ 所有-自动, 🇹🇼 台湾, 🌍 其他, 🧭 所有节点]

  - name: 💻 GitHub
    type: select
    proxies: [🇭🇰 香港, 🇯🇵 日本, 🇸🇬 新加坡, 🇺🇸 美国, ♻️ 所有-自动, 🇹🇼 台湾, 🌍 其他, 🧭 所有节点]

  - name: 💬 Telegram
    type: select
    proxies: [🇸🇬 新加坡, 🇭🇰 香港, 🇯🇵 日本, 🇺🇸 美国, ♻️ 所有-自动, 🧭 所有节点]

  - name: 🎬 流媒体
    type: select
    proxies: [♻️ 所有-自动, 🇭🇰 香港, 🇹🇼 台湾, 🇯🇵 日本, 🇸🇬 新加坡, 🇺🇸 美国, 🌍 其他, 🧭 所有节点]

  - name: 📱 社交媒体
    type: select
    proxies: [♻️ 所有-自动, 🇭🇰 香港, 🇹🇼 台湾, 🇯🇵 日本, 🇸🇬 新加坡, 🇺🇸 美国, 🌍 其他, 🧭 所有节点]

  - name: 🌍 国外网站
    type: select
    proxies: [🇭🇰 香港, 🇯🇵 日本, 🇸🇬 新加坡, 🇺🇸 美国, ♻️ 所有-自动, 🇹🇼 台湾, 🌍 其他, 🧭 所有节点]

  - name: 🐟 漏网之鱼
    type: select
    proxies: [🚀 节点选择, 🌍 国外网站, ♻️ 所有-自动, DIRECT]

  - name: 🛑 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🇭🇰 香港
    type: select
    proxies: [🇭🇰 香港-自动]
    use: [Airport]
    filter: "(?i)(香港|港|HK|Hong Kong|HongKong|HKG)"

  - name: 🇭🇰 香港-自动
    type: url-test
    use: [Airport]
    filter: "(?i)(香港|港|HK|Hong Kong|HongKong|HKG)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100

  - name: 🇹🇼 台湾
    type: select
    proxies: [🇹🇼 台湾-自动]
    use: [Airport]
    filter: "(?i)(台湾|台灣|台|TW|Taiwan|Taipei|TPE)"

  - name: 🇹🇼 台湾-自动
    type: url-test
    use: [Airport]
    filter: "(?i)(台湾|台灣|台|TW|Taiwan|Taipei|TPE)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100

  - name: 🇯🇵 日本
    type: select
    proxies: [🇯🇵 日本-自动]
    use: [Airport]
    filter: "(?i)(日本|日|JP|Japan|Tokyo|大阪|Osaka|东京|NRT|HND)"

  - name: 🇯🇵 日本-自动
    type: url-test
    use: [Airport]
    filter: "(?i)(日本|日|JP|Japan|Tokyo|大阪|Osaka|东京|NRT|HND)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100

  - name: 🇸🇬 新加坡
    type: select
    proxies: [🇸🇬 新加坡-自动]
    use: [Airport]
    filter: "(?i)(新加坡|新|SG|Singapore|SIN|狮城)"

  - name: 🇸🇬 新加坡-自动
    type: url-test
    use: [Airport]
    filter: "(?i)(新加坡|新|SG|Singapore|SIN|狮城)"
