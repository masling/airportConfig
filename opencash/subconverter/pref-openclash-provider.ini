# Subconverter profile for generating a local Mihomo/OpenClash provider file.
#
# Goal:
# - Convert a short-lived airport subscription into Clash/Mihomo YAML.
# - Preserve Mihomo node types such as `type: anytls`.
# - Install the converted output as:
#   /etc/openclash/proxy_provider/airport.yaml
#
# Security:
# - Do not commit generated airport.yaml.
# - Do not commit subscription URLs.
# - Keep this file as a reusable template only.

[common]
target=clash
url=
config=
emoji=true
add_emoji=true
remove_old_emoji=false
append_type=false
udp=true
tfo=false
scv=true
fdn=false
sort=false
list=false
insert=false
prepend=false
classic=true
tls13=true
expand=false
filter_deprecated=true

# Keep node remarks intact so the main OpenClash config can classify regions
# with regex filters such as United States, Hong Kong, Japan, Singapore, etc.
rename=

# Use the minimal provider-oriented base template. The output should remain a
# Clash/Mihomo YAML containing a `proxies:` list.
clash_rule_base=base/airport-provider-base.yaml

# No remote rules are required for provider generation; routing lives in
# config/openclash-custom.yaml.
surge_ruleset=
ruleset=

# Optional node filtering examples. Keep disabled by default.
# include_remarks=
# exclude_remarks=(?i)(剩余|流量|官网|套餐|Expire|Reset)

