# Subconverter profile for generating a full OpenClash/Mihomo config.
#
# This profile is intended to produce a converted YAML with the same strategy
# groups and routing policy names as `config/openclash-custom.yaml`.
#
# Security:
# - Keep `url=` empty in Git.
# - Do not commit generated YAML if it contains concrete airport nodes.
# - Do not commit subscription URLs, provider files, node servers, or passwords.
#
# Usage example on a trusted machine/router:
#   subconverter -g --artifact "clash" \
#     --config subconverter/pref-openclash-custom.ini \
#     --url "SHORT_LIVED_SUBSCRIPTION_URL"

[common]
target=clash
url=
config=

emoji=true
add_emoji=true
remove_old_emoji=false
append_type=false
udp=true
tfo=false
scv=true
fdn=false
sort=false
list=false
insert=false
prepend=false
classic=true
tls13=true
expand=true
filter_deprecated=true

enable_rule_generator=true
overwrite_original_rules=true
clash_rule_base=base/openclash-custom-base.yaml

# Keep node remarks intact so regex-based region groups match reliably.
rename=

# No external rulesets are used. Rules live in base/openclash-custom-base.yaml.
surge_ruleset=
ruleset=

